spreadsheet:
  url: ""
  sheet_name: Transactions

banks:
  - name: "NTB"
    senders:
      - "^NationsSMS$"
      - "^\\+.+$"
    patterns:
      - name: "card_purchase"
        direction: "debit"
        pattern: "^A TRANSACTION of LKR (?P<amount>[0-9,]+\\.[0-9]{2}) was approved on your A/C No\\. (?P<account>[0-9*]+) at (?P<description>.+?)\\. Current Bal LKR [0-9,]+\\.[0-9]{2}\\s*\\.?$"
      - name: "other_bank_atm_charge"
        direction: "credit"
        pattern: "^OTHER BANK ATM CHARG was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) CR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}$"
      - name: "atm_cash_withdrawal"
        direction: "debit"
        pattern: "^ATM CASH WITHDRAWAL LANKAPAY was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) DR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "atm_withdrawal_sc"
        direction: "debit"
        pattern: "^ATM WITHDRAWAL SC was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) DR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "cefts_transfer"
        direction: "debit"
        pattern: "^Other Bank Transfer \\(CEFTS\\) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) DR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "fund_transfer"
        direction: "debit"
        pattern: "^Dear Customer, (?P<description>Funds successfully transferred! .+?) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) on .+$"
      - name: "interest_paid"
        direction: "credit"
        pattern: "^(?P<description>[0-9A-Za-zXx*]+:Int\\.Pd:[^ ]+ to [^ ]+) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2})(?:\\s+Call .+)?$"
      - name: "islips"
        direction: "credit"
        pattern: "^\\s*(?P<description>ISLIPS)\\s+was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) CR\\.?(?: Current Bal LKR [0-9,]+\\.[0-9]{2})?\\s*$"

timezone: "UTC"
