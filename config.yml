spreadsheet:
  url: ""
  sheet_name: Transactions
  error_sheet: Errors

banks:
  - name: "NTB"
    senders:
      - "^NationsSMS$"
      - "^\\+.+$"
    patterns:
      - name: "card_purchase"
        direction: "debit"
        pattern: "^A TRANSACTION of LKR (?P<amount>[0-9,]+\\.[0-9]{2}) was approved on your A/C No\\. (?P<account>[0-9*]+) at (?P<description>.+?)\\. Current Bal LKR [0-9,]+\\.[0-9]{2}\\s*\\.?$"
      - name: "pos_reversal"
        direction: "credit"
        pattern: "^A TRANSACTION of LKR (?P<amount>[0-9,]+\\.[0-9]{2}) was approved on your A/C No\\. (?P<account>[0-9*]+) at (?P<description>POS Reversal Transaction - .+?)\\. Current Bal LKR [0-9,]+\\.[0-9]{2}\\s*\\.?$"
      - name: "other_bank_atm_charge"
        direction: "credit"
        pattern: "^(?P<description>OTHER BANK ATM CHARG) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) CR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}$"
      - name: "atm_cash_withdrawal"
        direction: "debit"
        pattern: "^(?P<description>ATM CASH WITHDRAWAL LANKAPAY) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) DR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "atm_withdrawal_sc"
        direction: "debit"
        pattern: "^(?P<description>ATM WITHDRAWAL SC) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) DR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "cefts_transfer"
        direction: "debit"
        pattern: "^(?P<description>Other Bank Transfer \\(CEFTS\\)) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) DR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "online_fund_trf_via_cefts"
        direction: "credit"
        pattern: "^(?P<description>ONLINE FUND TRF VIA CEFTS) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) CR\\. Current Bal LKR [0-9,]+\\.[0-9]{2}(?: Call .+)?$"
      - name: "interest_paid"
        direction: "credit"
        pattern: "^(?P<description>[0-9A-Za-zXx*]+:Int\\.Pd:[^ ]+ to [^ ]+) was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2})(?:\\s+Call .+)?$"
      - name: "islips"
        direction: "credit"
        pattern: "^\\s*(?P<description>ISLIPS)\\s+was performed on your Account No\\. (?P<account>[0-9A-Za-zXx*]+) for LKR (?P<amount>[0-9,]+\\.[0-9]{2}) CR\\.?(?: Current Bal LKR [0-9,]+\\.[0-9]{2})?\\s*$"

timezone: "UTC"
